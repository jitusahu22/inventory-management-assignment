version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory-backend
    # Start ONLY after Kafka is fully healthy
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000

      # Database — point to your host DB or a DB container if added later
      DB_HOST: host.docker.internal   # Windows/Mac: reaches host machine's localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: admin@123
      DB_NAME: inventory_db

      # Session
      SESSION_SECRET: inventory-management-secret-2025
      CLIENT_URL: http://localhost:5173

      # Kafka — use Docker internal network broker address (not localhost:9092)
      KAFKA_ENABLED: "true"
      KAFKA_BROKER: kafka:29092
      KAFKA_CLIENT_ID: inventory-management
      KAFKA_CONSUMER_GROUP: inventory-consumer-group
      KAFKA_API_KEY: ""
      KAFKA_API_SECRET: ""
    restart: unless-stopped
